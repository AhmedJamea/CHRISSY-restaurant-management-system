$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "admin",
      "password": "Admin@123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ============================================================
      // CHRISSY Auth — Login Endpoint Test Suite
      // POST {{baseUrl}}/api/auth/login
      // ============================================================
      //
      // Test scenarios covered:
      //
      // ✅ Successful Login (200)
      //    - Valid username + correct password + (Cashier must have BranchId)
      //    - Expects: token (string), userId (number), name (string),
      //               role (string), branchId (null or number)
      //    - Saves authToken to collection variable for downstream requests
      //
      // ❌ Wrong Password (401)
      //    - Correct username but wrong password
      //    - Expects: { "message": "Invalid username, password, or branch assignment." }
      //
      // ❌ Non-existent Username (401)
      //    - Username does not exist in the database
      //    - Expects: { "message": "Invalid username, password, or branch assignment." }
      //
      // ❌ Missing Username Field (401)
      //    - Request body omits the "username" key entirely
      //    - Expects: { "message": "Invalid username, password, or branch assignment." }
      //
      // ❌ Missing Password Field (401)
      //    - Request body omits the "password" key entirely
      //    - Expects: { "message": "Invalid username, password, or branch assignment." }
      //
      // ❌ Cashier Without Branch Assignment (401)
      //    - User exists and password is correct, but role is Cashier and BranchId is null
      //    - Expects: { "message": "Invalid username, password, or branch assignment." }
      //
      // Business rules:
      //    - JWT token expires in 8 hours
      //    - JWT contains: userId, jti, nameIdentifier, username, and optionally BranchId
      // ============================================================

      const jsonData = pm.response.json();

      if (pm.response.code === 200) {
          // ✅ Successful Login assertions

          pm.test("✅ Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("✅ Response has 'token' field (non-empty string)", function () {
              pm.expect(jsonData).to.have.property("token");
              pm.expect(jsonData.token).to.be.a("string").and.to.not.be.empty;
          });

          pm.test("✅ Response has 'userId' field (number)", function () {
              pm.expect(jsonData).to.have.property("userId");
              pm.expect(jsonData.userId).to.be.a("number");
          });

          pm.test("✅ Response has 'name' field (string)", function () {
              pm.expect(jsonData).to.have.property("name");
              pm.expect(jsonData.name).to.be.a("string");
          });

          pm.test("✅ Response has 'role' field (string)", function () {
              pm.expect(jsonData).to.have.property("role");
              pm.expect(jsonData.role).to.be.a("string");
          });

          pm.test("✅ Response has 'branchId' field (null or number)", function () {
              pm.expect(jsonData).to.have.property("branchId");
              const branchId = jsonData.branchId;
              const isValid = branchId === null || typeof branchId === "number";
              pm.expect(isValid).to.be.true;
          });

          // Save token for use in downstream requests
          pm.collectionVariables.set("authToken", jsonData.token);
          console.log("✅ authToken saved to collection variables.");

      } else if (pm.response.code === 401) {
          // ❌ Failed Login assertions

          pm.test("❌ Status code is 401", function () {
              pm.response.to.have.status(401);
          });

          pm.test("❌ Response has 'message' field", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string").and.to.not.be.empty;
          });

          console.log("❌ Login failed. Message:", jsonData.message);

      } else {
          pm.test("⚠️ Unexpected status code: " + pm.response.code, function () {
              pm.expect.fail("Received unexpected status code: " + pm.response.code);
          });
      }
